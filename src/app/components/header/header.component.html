<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

    <span>
      <img src="../../../assets/images/logoicon.svg" width="25px" height="25px"/>
    </span>
    <span><ion-title>{{ title }}</ion-title></span>

    <ion-button slot="end"
      (click)="onLogin()"
      *ngIf="!userIsAuthenticated"
      style="font-size: large;"
      color="secondary"
      shape="round">Login
    </ion-button>

    <ion-button slot="end"
      (click)="onLogout()"
      *ngIf="userIsAuthenticated"
      style="font-size: 13px;"
      size="medium"
      color="tertiary"
      shape="round">Logout
    </ion-button>

  </ion-toolbar>
</ion-header>

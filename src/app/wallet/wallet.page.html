<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ title }}</ion-title>
  </ion-toolbar>
</ion-header>


<ion-content>
  <ion-segment value="transactions">

    <ion-segment-button value="history" (click)='goToPage("history")'>
      <ion-label><ion-icon name="time" slot="start" size="large"></ion-icon></ion-label>
      <ion-label>
        History
      </ion-label>
    </ion-segment-button>

    <ion-segment-button value="trade"(click)='goToPage("trade")'>
      <ion-label><ion-icon name="swap-horizontal" size="large" slot="start"></ion-icon></ion-label>
      <ion-label>Trade</ion-label>
    </ion-segment-button>

    <ion-segment-button value="deposit" (click)='goToPage("deposit")'>
      <ion-label><ion-icon name="enter" size="large" slot="start"></ion-icon></ion-label>
      <ion-label>Deposit</ion-label>
    </ion-segment-button>

    <ion-segment-button value="withdraw" (click)='goToPage("withdraw")'>
      <ion-label><ion-icon name="exit" class="flip" size="large"></ion-icon></ion-label>
      <ion-label>Withdraw</ion-label>
    </ion-segment-button>

    <ion-segment-button value="transfer" (click)='goToPage("transfer")'>
      <ion-label><ion-icon name="navigate" size="large" slot="start"></ion-icon></ion-label>
      <ion-label>Transfer</ion-label>
    </ion-segment-button>

  </ion-segment>
  <router-outlet></router-outlet>
</ion-content>

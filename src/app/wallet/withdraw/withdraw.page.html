<ion-content>
  <ion-card>
    <ion-grid>
      <ion-row>
        <ion-col size="9">
          <ion-item>
            <ion-label position="floating" class="weak">Adress</ion-label>
            <ion-input placeholder="Receiver Adress"></ion-input>
          </ion-item>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="9">
          <ion-item>
            <ion-label position="floating" class="weak">Withdrawal Amount</ion-label>
            <ion-input type="number" placeholder="0.00"></ion-input>
          </ion-item>
        </ion-col>
        <ion-col size="3">
          <ion-item>
            <ion-select placeholder="Wallet">
              <ion-select-option value="dollar">USD</ion-select-option>
              <ion-select-option value="naira">NGN</ion-select-option>
              <ion-select-option value="euro">EUR</ion-select-option>
              <ion-select-option value="bitcoin">BTC</ion-select-option>
              <ion-select-option value="usdCoin">USDC</ion-select-option>
              <ion-select-option value="canadaDollars">CAD</ion-select-option>
            </ion-select>
          </ion-item>
        </ion-col>
      </ion-row>
    </ion-grid>
    <br>
  </ion-card>
</ion-content>
